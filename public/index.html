<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HUNA7-OS</title>
<style>
/* ═══════════════════════════════════════════════════════════
   HUNA7-OS :: THEME ENGINE — CSS Variable Design System
═══════════════════════════════════════════════════════════ */
:root {
  --os-bg:          #0a0c10;
  --os-surface:     #12151c;
  --os-surface2:    #1a1f2b;
  --os-border:      #252b38;
  --os-border2:     #2e3547;
  --os-accent:      #3b82f6;
  --os-accent2:     #6366f1;
  --os-accent3:     #0ea5e9;
  --os-green:       #22c55e;
  --os-red:         #ef4444;
  --os-amber:       #f59e0b;
  --os-text:        #e2e8f0;
  --os-text2:       #94a3b8;
  --os-text3:       #64748b;
  --os-taskbar-h:   44px;
  --os-font:        'Courier Prime', 'Courier New', monospace;
  --os-font-ui:     'Share Tech Mono', 'Courier New', monospace;
  --os-radius:      6px;
  --os-radius2:     10px;
  --os-shadow:      0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
  --os-glow:        0 0 20px rgba(59,130,246,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

body {
  font-family: var(--os-font-ui);
  color: var(--os-text);
  user-select: none;
  -webkit-user-select: none;
}

/* ─── BOOT SCREEN ─────────────────────────────────────── */
#boot-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s ease;
}

.boot-logo {
  margin-bottom: 40px;
  animation: bootLogoReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  opacity: 0;
}

@keyframes bootLogoReveal {
  0%   { opacity: 0; transform: scale(0.7) translateY(20px); }
  60%  { opacity: 1; transform: scale(1.03) translateY(-2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.boot-stages {
  width: 380px;
  margin-bottom: 24px;
}

.boot-stage {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 0;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.35s ease;
  font-size: 12px;
  color: var(--os-text3);
  font-family: var(--os-font);
}
.boot-stage.active { opacity: 1; transform: translateX(0); color: var(--os-text2); }
.boot-stage.done   { opacity: 0.7; color: var(--os-green); }
.boot-stage-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--os-border2); flex-shrink: 0;
  transition: background 0.3s;
}
.boot-stage.active .boot-stage-dot { background: var(--os-accent); box-shadow: 0 0 8px var(--os-accent); }
.boot-stage.done   .boot-stage-dot { background: var(--os-green); }

.boot-bar-wrap {
  width: 380px; height: 2px;
  background: var(--os-border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 20px;
}
.boot-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--os-accent), var(--os-accent2));
  transition: width 0.4s ease;
  border-radius: 2px;
}

.boot-version {
  font-size: 10px;
  color: var(--os-text3);
  letter-spacing: 0.2em;
  font-family: var(--os-font);
}

/* ─── DESKTOP ──────────────────────────────────────────── */
#huna7-desktop {
  position: fixed; inset: 0;
  padding-bottom: var(--os-taskbar-h);
  background: var(--os-bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 30% 20%, rgba(59,130,246,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 70% 80%, rgba(99,102,241,0.03) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.012) 39px, rgba(255,255,255,0.012) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.012) 39px, rgba(255,255,255,0.012) 40px);
  display: none;
}

/* Desktop context menu */
#desktop-ctx {
  position: fixed; display: none; z-index: 8000;
  background: var(--os-surface);
  border: 1px solid var(--os-border2);
  border-radius: var(--os-radius);
  padding: 4px;
  box-shadow: var(--os-shadow);
  min-width: 160px;
}
.ctx-item {
  padding: 7px 14px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  color: var(--os-text2);
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--os-border); color: var(--os-text); }
.ctx-sep { height: 1px; background: var(--os-border); margin: 3px 0; }

/* ─── TASKBAR ──────────────────────────────────────────── */
#huna7-taskbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--os-taskbar-h);
  background: rgba(10,12,16,0.95);
  border-top: 1px solid var(--os-border);
  backdrop-filter: blur(12px);
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 8px;
  z-index: 5000;
}

.taskbar-logo {
  display: flex; align-items: center; gap: 8px;
  margin-right: 8px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--os-radius);
  transition: background 0.15s;
}
.taskbar-logo:hover { background: var(--os-border); }
.taskbar-logo-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--os-text);
}

.taskbar-sep { width: 1px; height: 24px; background: var(--os-border); margin: 0 4px; }

#huna7-taskbar-apps {
  display: flex; align-items: center; gap: 4px;
  flex: 1; overflow-x: auto;
}
#huna7-taskbar-apps::-webkit-scrollbar { display: none; }

.taskbar-app-btn {
  background: var(--os-surface2);
  border: 1px solid var(--os-border);
  color: var(--os-text2);
  padding: 4px 12px;
  border-radius: var(--os-radius);
  font-size: 11px;
  font-family: var(--os-font-ui);
  cursor: pointer;
  transition: all 0.15s;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.taskbar-app-btn:hover { background: var(--os-border2); color: var(--os-text); }
.taskbar-app-btn.minimized { opacity: 0.5; font-style: italic; }

.taskbar-clock {
  font-size: 12px; color: var(--os-text2);
  margin-left: auto;
  font-family: var(--os-font);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ─── LAUNCHER / APP MENU ──────────────────────────────── */
#huna7-launcher {
  position: fixed; bottom: var(--os-taskbar-h); left: 0;
  width: 340px; background: var(--os-surface);
  border: 1px solid var(--os-border2);
  border-bottom: none;
  border-radius: var(--os-radius2) var(--os-radius2) 0 0;
  padding: 16px;
  box-shadow: var(--os-shadow);
  z-index: 6000;
  display: none;
  animation: launcherOpen 0.22s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes launcherOpen {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.launcher-title {
  font-size: 11px; color: var(--os-text3);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--os-border);
}
.launcher-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.launcher-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 12px 8px;
  background: var(--os-surface2);
  border: 1px solid var(--os-border);
  border-radius: var(--os-radius);
  cursor: pointer; transition: all 0.15s;
  font-size: 11px; color: var(--os-text2);
  text-align: center;
}
.launcher-item:hover { background: var(--os-border); color: var(--os-text); border-color: var(--os-accent); }
.launcher-item svg { opacity: 0.8; }
.launcher-item:hover svg { opacity: 1; }

/* ─── WINDOWS ──────────────────────────────────────────── */
.huna7-window {
  position: absolute;
  background: var(--os-surface);
  border: 1px solid var(--os-border2);
  border-radius: var(--os-radius2);
  box-shadow: var(--os-shadow), var(--os-glow);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: winOpen 0.18s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  min-width: 300px; min-height: 200px;
}
@keyframes winOpen {
  from { opacity: 0; transform: scale(0.92) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.win-closing {
  animation: winClose 0.18s ease forwards;
}
@keyframes winClose {
  to { opacity: 0; transform: scale(0.94) translateY(4px); }
}

.win-titlebar {
  background: var(--os-surface2);
  border-bottom: 1px solid var(--os-border);
  padding: 0 10px;
  height: 36px;
  display: flex; align-items: center;
  cursor: grab; flex-shrink: 0;
}
.win-titlebar:active { cursor: grabbing; }
.win-title {
  font-size: 12px; color: var(--os-text2);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: 0.05em;
}
.win-controls { display: flex; gap: 6px; }
.win-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid var(--os-border2);
  background: var(--os-surface);
  color: var(--os-text3);
  font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
  line-height: 1;
}
.win-minimize:hover { background: var(--os-amber); color: #000; border-color: var(--os-amber); }
.win-close:hover    { background: var(--os-red);   color: #fff; border-color: var(--os-red); }

.win-body {
  flex: 1; overflow: hidden; position: relative;
}

/* ─── OS SHARED COMPONENTS ─────────────────────────────── */
.os-btn {
  background: var(--os-surface2);
  border: 1px solid var(--os-border2);
  color: var(--os-text2);
  padding: 5px 12px;
  border-radius: var(--os-radius);
  font-size: 11px;
  font-family: var(--os-font-ui);
  cursor: pointer; transition: all 0.15s;
}
.os-btn:hover { background: var(--os-border); color: var(--os-text); }

/* ─── TERMINAL APP ──────────────────────────────────────── */
.app-terminal {
  display: flex; flex-direction: column;
  height: 100%;
  background: #07090f;
  font-family: var(--os-font);
}
.term-output {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  scrollbar-width: thin; scrollbar-color: var(--os-border) transparent;
}
.term-output::-webkit-scrollbar { width: 4px; }
.term-output::-webkit-scrollbar-thumb { background: var(--os-border2); }
.term-line { font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.term-cmd  { color: var(--os-text3); }
.term-out  { color: var(--os-text); }
.term-err  { color: var(--os-red); }
.term-sys  { color: var(--os-accent3); }
.term-info { color: var(--os-text2); padding-left: 8px; }
.term-input-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--os-border);
  background: #07090f;
}
.term-prompt { color: var(--os-accent); font-size: 12px; flex-shrink: 0; }
.term-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--os-text); font-family: var(--os-font); font-size: 12px;
  caret-color: var(--os-accent);
}

/* ─── TEXT EDITOR APP ───────────────────────────────────── */
.app-editor { display: flex; flex-direction: column; height: 100%; }
.editor-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--os-border);
  background: var(--os-surface2);
  flex-shrink: 0;
}
.ed-input {
  background: var(--os-bg); border: 1px solid var(--os-border2);
  color: var(--os-text); padding: 4px 8px;
  border-radius: var(--os-radius); font-size: 11px;
  font-family: var(--os-font-ui);
}
.ed-status { font-size: 11px; color: var(--os-green); margin-left: 4px; }
.ed-textarea {
  flex: 1; background: #07090f; border: none; outline: none;
  color: var(--os-text); font-family: var(--os-font); font-size: 12px;
  padding: 14px; resize: none; line-height: 1.7;
  scrollbar-width: thin; scrollbar-color: var(--os-border) transparent;
}

/* ─── FILE MANAGER APP ──────────────────────────────────── */
.app-files { display: flex; flex-direction: column; height: 100%; }
.fm-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--os-border);
  background: var(--os-surface2);
}
.fm-path { flex: 1; font-size: 12px; color: var(--os-text2); font-family: var(--os-font); }
.fm-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: var(--os-border) transparent; }
.fm-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: var(--os-radius);
  cursor: pointer; font-size: 12px; color: var(--os-text2);
  transition: background 0.12s;
}
.fm-item:hover { background: var(--os-border); color: var(--os-text); }
.fm-type { margin-left: auto; font-size: 10px; color: var(--os-text3); }
.fm-err { color: var(--os-red); padding: 12px; font-size: 12px; }
.fm-statusbar { padding: 6px 12px; border-top: 1px solid var(--os-border); font-size: 10px; color: var(--os-text3); }

/* ─── VOXPAD APP ────────────────────────────────────────── */
.app-voxpad { display: flex; flex-direction: column; height: 100%; }
.vox-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--os-border);
  background: var(--os-surface2);
}
.vox-label { font-size: 11px; color: var(--os-text3); flex: 1; text-transform: uppercase; letter-spacing: 0.1em; }
.vox-run-btn { background: var(--os-accent) !important; color: #fff !important; border-color: var(--os-accent) !important; }
.vox-run-btn:hover { filter: brightness(1.2); }
.vox-split { display: flex; flex: 1; overflow: hidden; }
.vox-editor {
  flex: 1; background: #07090f; border: none; outline: none;
  border-right: 1px solid var(--os-border);
  color: var(--os-text); font-family: var(--os-font); font-size: 12px;
  padding: 14px; resize: none; line-height: 1.7;
}
.vox-output {
  flex: 1; overflow-y: auto; padding: 14px;
  font-family: var(--os-font); font-size: 12px;
  background: #050709;
  scrollbar-width: thin; scrollbar-color: var(--os-border) transparent;
}
.vox-line { line-height: 1.6; white-space: pre-wrap; color: var(--os-text); }
.vox-err  { color: var(--os-red); }
.vox-sys  { color: var(--os-text3); }

/* ─── NAVIGATOR APP ─────────────────────────────────────── */
.app-nav { display: flex; flex-direction: column; height: 100%; }
.nav-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--os-border);
  background: var(--os-surface2);
}
.nav-url {
  flex: 1; background: var(--os-bg); border: 1px solid var(--os-border2);
  color: var(--os-text); padding: 5px 10px;
  border-radius: var(--os-radius); font-size: 12px;
  font-family: var(--os-font-ui); outline: none;
}
.nav-url:focus { border-color: var(--os-accent); }
.nav-frame { flex: 1; border: none; background: #fff; }

/* ─── SYSTEM MONITOR ────────────────────────────────────── */
.app-sysmon { display: flex; flex-direction: column; height: 100%; gap: 0; }
.sm-section { flex: 1; padding: 12px; border-bottom: 1px solid var(--os-border); overflow-y: auto; }
.sm-section h3 { font-size: 10px; letter-spacing: 0.15em; color: var(--os-text3); text-transform: uppercase; margin-bottom: 8px; }
.sm-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 11px; font-family: var(--os-font); border-bottom: 1px solid rgba(255,255,255,0.03); }
.sm-pid { color: var(--os-accent3); min-width: 40px; }
.sm-type { margin-left: auto; color: var(--os-text3); font-size: 10px; }
.sm-evt { color: var(--os-text2); }
.sm-evttype { color: var(--os-accent2); }
.sm-src { color: var(--os-text3); font-size: 10px; margin-left: auto; }
.sm-empty { color: var(--os-text3); font-size: 11px; font-style: italic; }
.sm-footer { padding: 10px 12px; border-top: 1px solid var(--os-border); display: flex; align-items: center; gap: 10px; }
.sm-stat { font-size: 11px; color: var(--os-text3); font-family: var(--os-font); margin-left: auto; }

/* ─── LIBRARY APP ───────────────────────────────────────── */
.app-library { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
.lib-header { display: flex; align-items: center; gap: 12px; font-size: 16px; color: var(--os-text2); margin-bottom: 32px; font-weight: 600; letter-spacing: 0.05em; }
.lib-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--os-text3); font-size: 13px; }
.lib-sub { font-size: 11px; color: var(--os-text3); opacity: 0.6; }

/* ─── DESKTOP ICONS ─────────────────────────────────────── */
.desktop-icon {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 10px 8px;
  cursor: pointer;
  border-radius: var(--os-radius);
  transition: background 0.12s;
  width: 80px; text-align: center;
}
.desktop-icon:hover { background: rgba(255,255,255,0.06); }
.desktop-icon-label {
  font-size: 11px; color: var(--os-text2);
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  line-height: 1.3; word-break: break-word;
}

/* ─── NOTIFICATIONS ─────────────────────────────────────── */
#huna7-notifs {
  position: fixed; top: 14px; right: 14px;
  z-index: 7000;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.notif {
  background: var(--os-surface);
  border: 1px solid var(--os-border2);
  border-left: 3px solid var(--os-accent);
  border-radius: var(--os-radius);
  padding: 10px 14px;
  font-size: 11px; color: var(--os-text2);
  box-shadow: var(--os-shadow);
  max-width: 280px;
  animation: notifIn 0.25s ease forwards;
  pointer-events: auto;
}
.notif.notif-err { border-left-color: var(--os-red); }
.notif.notif-ok  { border-left-color: var(--os-green); }
@keyframes notifIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes notifOut {
  to { opacity: 0; transform: translateX(20px); }
}

/* ─── SCROLLBARS ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--os-border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- ═══ BOOT SCREEN ═══════════════════════════════════════ -->
<div id="boot-screen">
  <div class="boot-logo">
    <svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
      </defs>
      <!-- H mark -->
      <rect x="8" y="8" width="4" height="28" fill="url(#lg1)" rx="1"/>
      <rect x="8" y="20" width="14" height="4" fill="url(#lg1)" rx="1"/>
      <rect x="18" y="8" width="4" height="28" fill="url(#lg1)" rx="1"/>
      <!-- 7 mark -->
      <rect x="26" y="8" width="14" height="4" fill="url(#lg1)" rx="1"/>
      <rect x="34" y="12" width="4" height="12" fill="url(#lg1)" rx="1" transform="rotate(-10 36 18)"/>
      <!-- OS text -->
      <text x="50" y="32" fill="#e2e8f0" font-family="Courier Prime, monospace" font-size="26" font-weight="700" letter-spacing="1">HUNA7</text>
      <text x="152" y="32" fill="url(#lg1)" font-family="Courier Prime, monospace" font-size="26" font-weight="700">-OS</text>
      <!-- subtitle line -->
      <text x="50" y="46" fill="#475569" font-family="Courier New, monospace" font-size="9" letter-spacing="4">KERNEL SYSTEM v1.0</text>
    </svg>
  </div>

  <div class="boot-stages" id="boot-stages">
    <div class="boot-stage" id="bs-0"><div class="boot-stage-dot"></div>Initializing kernel core...</div>
    <div class="boot-stage" id="bs-1"><div class="boot-stage-dot"></div>Mounting virtual file system...</div>
    <div class="boot-stage" id="bs-2"><div class="boot-stage-dot"></div>Loading VoxScript runtime...</div>
    <div class="boot-stage" id="bs-3"><div class="boot-stage-dot"></div>Starting process scheduler...</div>
    <div class="boot-stage" id="bs-4"><div class="boot-stage-dot"></div>Loading security module...</div>
    <div class="boot-stage" id="bs-5"><div class="boot-stage-dot"></div>Launching UI shell...</div>
  </div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar"></div></div>
  <div class="boot-version">HUNA7-OS &nbsp;&middot;&nbsp; BUILD 2025.06</div>
</div>

<!-- ═══ DESKTOP ════════════════════════════════════════════ -->
<div id="huna7-desktop"></div>

<!-- Desktop Context Menu -->
<div id="desktop-ctx">

  <div class="ctx-item" onclick="closeCtx()">
    <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M7 5v2l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Dismiss
  </div>
</div>

<!-- ═══ TASKBAR ════════════════════════════════════════════ -->
<div id="huna7-taskbar">
  <div class="taskbar-logo" onclick="toggleLauncher()">
    <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="tlg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>

      <rect x="2" y="13" width="7" height="7" rx="1.5" fill="url(#tlg)" opacity="0.7"/>

<div id="huna7-launcher">
  <div class="launcher-title">Applications</div>
  <div class="launcher-grid" id="launcher-grid"></div>
</div>

<!-- ═══ NOTIFICATIONS ══════════════════════════════════════ -->
<div id="huna7-notifs"></div>

<!-- ═══ SCRIPTS — load order matters ══════════════════════ -->
<script src="kernel/eventbus.js"></script>
<script src="kernel/process.js"></script>
<script src="vfs/vfs.js"></script>
<script src="vox/vm.js"></script>
<script src="security/auth.js"></script>
<script src="kernel/api.js"></script>
<script src="shell/windowmanager.js"></script>
<script src="apps/registry.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   HUNA7-OS :: BOOT SEQUENCE + SHELL INIT
═══════════════════════════════════════════════════════════ */

const BOOT_STAGES = [
  { delay: 300,  duration: 400 },  // kernel
  { delay: 750,  duration: 500 },  // vfs
  { delay: 1300, duration: 400 },  // vox
  { delay: 1750, duration: 350 },  // scheduler
  { delay: 2150, duration: 350 },  // security
  { delay: 2550, duration: 400 },  // ui shell
];

function runBootStage(idx, done) {
  return new Promise(resolve => {
    setTimeout(() => {
      const el = document.getElementById('bs-' + idx);
      if (el) el.classList.add('active');
      const bar = document.getElementById('boot-bar');
      if (bar) bar.style.width = ((idx + 1) / BOOT_STAGES.length * 100) + '%';
      setTimeout(() => {
        if (el) { el.classList.remove('active'); el.classList.add('done'); }
        resolve();
      }, BOOT_STAGES[idx].duration);
    }, BOOT_STAGES[idx].delay);
  });
}

async function bootSequence() {
  for (let i = 0; i < BOOT_STAGES.length; i++) {
    await runBootStage(i);
  }
  // finalize boot
  setTimeout(() => {
    const bs = document.getElementById('boot-screen');
    bs.style.opacity = '0';
    setTimeout(() => {
      bs.style.display = 'none';
      const desktop = document.getElementById('huna7-desktop');
      desktop.style.display = 'block';
      initShell();
    }, 600);
  }, 400);
}

/* ─── SHELL INIT ─────────────────────────────────────────── */
function initShell() {
  buildDesktopIcons();
  buildLauncher();
  startClock();
  registerDesktopEvents();
  notify('HUNA7-OS ready.', 'ok');
  OS.system.log('Desktop initialized');

  // spawn initial OS processes
  window.__HUNA7_PROCS__.spawn('desktop-shell', 'system', {});
  window.__HUNA7_PROCS__.spawn('vfs-daemon',    'system', {});
  window.__HUNA7_PROCS__.spawn('event-bus',     'system', {});
}

/* ─── DESKTOP ICONS ─────────────────────────────────────── */
const DESKTOP_ICONS = [
  { appId: 'terminal', label: 'Terminal', x: 20, y: 20,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#0ea5e9" opacity="0.15"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#0ea5e9" stroke-width="1.2"/><path d="M10 13l4 4-4 4M18 21h8" stroke="#0ea5e9" stroke-width="1.8" stroke-linecap="round"/></svg>` },
  { appId: 'editor', label: 'Text Editor', x: 20, y: 120,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#6366f1" opacity="0.15"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#6366f1" stroke-width="1.2"/><path d="M10 12h10l4 4v8H10z" fill="none" stroke="#6366f1" stroke-width="1.5"/><path d="M13 20h7M13 23h5" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/></svg>` },
  { appId: 'files', label: 'Files', x: 20, y: 220,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#f59e0b" opacity="0.12"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.2"/><path d="M8 14h7l2 2h11v10H8z" fill="none" stroke="#f59e0b" stroke-width="1.5"/></svg>` },
  { appId: 'voxpad', label: 'VoxPad', x: 20, y: 320,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#22c55e" opacity="0.12"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#22c55e" stroke-width="1.2"/><path d="M12 12h5M12 17l8 0M12 22l6 0" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/><circle cx="24" cy="22" r="4" fill="none" stroke="#22c55e" stroke-width="1.5"/><path d="M26 24l2 2" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/></svg>` },
  { appId: 'navigator', label: 'Navigator', x: 20, y: 420,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#3b82f6" opacity="0.12"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.2"/><circle cx="18" cy="18" r="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/><path d="M18 10v16M10 18h16" stroke="#3b82f6" stroke-width="1" opacity="0.5"/><path d="M14 12a10 10 0 0 0 0 12M22 12a10 10 0 0 1 0 12" fill="none" stroke="#3b82f6" stroke-width="1.2"/></svg>` },
  { appId: 'sysmon', label: 'Sys Monitor', x: 20, y: 520,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#ef4444" opacity="0.1"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#ef4444" stroke-width="1.2"/><path d="M8 22l4-6 4 4 4-6 4 4" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>` },
  { appId: 'library', label: 'Library', x: 20, y: 620,
    icon: `<svg width="36" height="36" viewBox="0 0 36 36"><rect x="2" y="2" width="32" height="32" rx="6" fill="#8b5cf6" opacity="0.12"/><rect x="2" y="2" width="32" height="32" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.2"/><rect x="8" y="10" width="20" height="16" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1.5"/><circle cx="18" cy="18" r="3.5" fill="none" stroke="#8b5cf6" stroke-width="1.5"/></svg>` },
];

function buildDesktopIcons() {
  const desktop = document.getElementById('huna7-desktop');
  DESKTOP_ICONS.forEach(ic => {
    const el = document.createElement('div');
    el.className = 'desktop-icon';
    el.style.left = ic.x + 'px';
    el.style.top  = ic.y + 'px';
    el.innerHTML = ic.icon + `<span class="desktop-icon-label">${ic.label}</span>`;
    el.addEventListener('dblclick', () => AppRegistry.launch(ic.appId));
    desktop.appendChild(el);
  });
}

/* ─── LAUNCHER ───────────────────────────────────────────── */
const LAUNCHER_APPS = [
  { id: 'terminal', label: 'Terminal', icon: `<svg width="24" height="24" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M6 9l3 3-3 3M11 15h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>` },
  { id: 'editor',   label: 'Editor',   icon: `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M5 4h9l4 4v12H5z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 12h8M8 15h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>` },
  { id: 'files',    label: 'Files',    icon: `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 8h7l2 2h9v10H3z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>` },
  { id: 'voxpad',   label: 'VoxPad',   icon: `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 4h9M4 9h10M4 14h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="17" cy="17" r="5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M19 19l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>` },
  { id: 'navigator',label: 'Navigator',icon: `<svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="0.8" opacity="0.4"/></svg>` },
  { id: 'sysmon',   label: 'Monitor',  icon: `<svg width="24" height="24" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 14l3-4 3 3 3-5 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>` },
  { id: 'library',  label: 'Library',  icon: `<svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>` },
];

function buildLauncher() {
  const grid = document.getElementById('launcher-grid');
  LAUNCHER_APPS.forEach(app => {
    const el = document.createElement('div');
    el.className = 'launcher-item';
    el.innerHTML = app.icon + `<span>${app.label}</span>`;
    el.addEventListener('click', () => {
      AppRegistry.launch(app.id);
      toggleLauncher(false);
    });
    grid.appendChild(el);
  });
}

let _launcherOpen = false;
function toggleLauncher(force) {
  const lnch = document.getElementById('huna7-launcher');
  _launcherOpen = force !== undefined ? force : !_launcherOpen;
  lnch.style.display = _launcherOpen ? 'block' : 'none';
}

/* ─── CLOCK ──────────────────────────────────────────────── */
function startClock() {
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    const d = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    document.getElementById('os-clock').textContent = `${d}   ${h}:${m}:${s}`;
  }
  tick();
  setInterval(tick, 1000);
}

/* ─── DESKTOP EVENTS ─────────────────────────────────────── */
function registerDesktopEvents() {
  const desktop = document.getElementById('huna7-desktop');
  const ctx = document.getElementById('desktop-ctx');

  desktop.addEventListener('contextmenu', e => {
    e.preventDefault();
    ctx.style.left = e.clientX + 'px';
    ctx.style.top  = e.clientY + 'px';
    ctx.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!ctx.contains(e.target)) ctx.style.display = 'none';
    if (!document.getElementById('huna7-launcher').contains(e.target) &&
        !document.querySelector('.taskbar-logo').contains(e.target)) {
      toggleLauncher(false);
    }
  });
}

function closeCtx() {
  document.getElementById('desktop-ctx').style.display = 'none';
}

/* ─── NOTIFICATIONS ──────────────────────────────────────── */
function notify(msg, type = '') {
  const container = document.getElementById('huna7-notifs');
  const el = document.createElement('div');
  el.className = 'notif' + (type ? ' notif-' + type : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'notifOut 0.25s ease forwards';
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

// Subscribe to kernel events for notifications
window.__HUNA7_BUS__.on('auth.success', () => notify('Admin access granted.', 'ok'));
window.__HUNA7_BUS__.on('auth.revoked', () => notify('Admin session revoked.', 'err'));
window.__HUNA7_BUS__.on('file.created', e => notify('File updated: ' + (e.payload.path || ''), ''));

/* ─── BOOT ───────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  bootSequence();
});
</script>
